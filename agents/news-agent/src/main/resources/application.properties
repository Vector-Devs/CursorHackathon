spring.application.name=news-agent

# Mock news service (run mockServices first)
news.api.base-url=http://localhost:8082
news.api.path=/api/v1/article/getArticles

# Agent HTTP port (avoid clash with mockServices)
server.port=8090

# Classification: min-score reserved for future use; top categories are the highest scores (up to max below)
agent.classification.min-score=0.12
agent.classification.max-categories-per-article=4

# Periodically re-run classification (same as GET /api/agent/classified-news). Disable for tests or strict control.
agent.schedule.enabled=true
# Demo: poll mock news every second; mockArticles applies gradual drift each response.
agent.schedule.initial-delay-ms=500
# After each run finishes, wait this long before the next (ms)
agent.schedule.fixed-delay-ms=1000

# After each scheduled news run, GET reasoning-agent then supply-chain-risk (simulation) so the UI reads fresh data.
agent.pipeline.enabled=true
agent.pipeline.reasoning-base-url=http://localhost:8093
agent.pipeline.simulation-base-url=http://localhost:8094
agent.pipeline.connect-timeout-ms=10000
agent.pipeline.read-timeout-ms=120000
# With 1s news polling, throttle reasoning→simulation so backends are not hit every second (0 = no throttle).
agent.pipeline.min-interval-ms=3000
