<?xml version="1.0" encoding="UTF-8"?>
<!--
  Riscon mark - symbolic layers:
  1) Compass / wind rose: orientation and maritime command (bearing).
  2) Radar sector: live scanning, probability, where to look now.
  3) Ring nodes: plants, suppliers, lanes; one accent = priority risk.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Riscon">
  <rect width="512" height="512" rx="88" fill="#060812"/>

  <!-- Outer ring: deck BORDER + whisper of cyan (glow) -->
  <circle cx="256" cy="256" r="152" fill="none" stroke="#2A3A58" stroke-width="2"/>
  <circle cx="256" cy="256" r="152" fill="none" stroke="#22E3FF" stroke-width="1" opacity="0.18"/>

  <!-- Radar sweep: NE quadrant (deck ACCENT cyan) -->
  <path fill="#22E3FF" fill-opacity="0.16" d="M 256 256 L 256 104 A 152 152 0 0 1 408 256 Z"/>

  <!-- Cardinals: E/W/S slate; N only in theme cyan (bearing) -->
  <g stroke-width="2.5" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="108" stroke="#22E3FF" opacity="0.55"/>
    <line x1="256" y1="256" x2="256" y2="404" stroke="#94a3b8"/>
    <line x1="256" y1="256" x2="108" y2="256" stroke="#94a3b8"/>
    <line x1="256" y1="256" x2="404" y2="256" stroke="#94a3b8"/>
  </g>
  <!-- Intercardinals: mostly slate; one ACCENT_HOT line (single punch) -->
  <g stroke-width="1.75" stroke-linecap="round">
    <line x1="256" y1="256" x2="353.6" y2="158.4" stroke="#475569" opacity="0.9"/>
    <line x1="256" y1="256" x2="353.6" y2="353.6" stroke="#FF2D95" opacity="0.42"/>
    <line x1="256" y1="256" x2="158.4" y2="353.6" stroke="#475569" opacity="0.9"/>
    <line x1="256" y1="256" x2="158.4" y2="158.4" stroke="#475569" opacity="0.9"/>
  </g>

  <!-- Command hub -->
  <circle cx="256" cy="256" r="22" fill="#0f172a" stroke="#22E3FF" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="6" fill="#22E3FF"/>

  <!-- Network nodes on perimeter: sites in the footprint; highlighted = active risk -->
  <circle cx="256" cy="104" r="7" fill="#475569" stroke="#1e293b" stroke-width="1"/>
  <circle cx="408" cy="256" r="7" fill="#22E3FF" stroke="#0f172a" stroke-width="1"/>
  <circle cx="256" cy="408" r="7" fill="#CCFF00" fill-opacity="0.55" stroke="#1e293b" stroke-width="1"/>
  <circle cx="104" cy="256" r="7" fill="#475569" stroke="#1e293b" stroke-width="1"/>
  <circle cx="158.4" cy="158.4" r="5" fill="#475569" opacity="0.85"/>
  <circle cx="353.6" cy="158.4" r="5" fill="#475569" opacity="0.85"/>
  <circle cx="353.6" cy="353.6" r="5" fill="#475569" opacity="0.85"/>
  <circle cx="158.4" cy="353.6" r="5" fill="#475569" opacity="0.85"/>
</svg>
